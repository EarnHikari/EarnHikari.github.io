<!doctype html>
<html lang="id">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
<title>List Airdrop By Earn Hikari</title>

  <meta name="description" content="List Airdrop by Earn Hikari." />


  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg0:#06070d;
      --bg1:#0b1020;
      --card: rgba(255,255,255,.06);
      --card2: rgba(255,255,255,.08);
      --stroke: rgba(255,255,255,.12);
      --text:#eaf0ff;
      --muted: rgba(234,240,255,.72);
      --muted2: rgba(234,240,255,.55);
      --brand1:#7c3aed;
      --brand2:#22d3ee;
      --good:#22c55e;
      --warn:#f59e0b;
      --bad:#ef4444;
      --shadow: 0 18px 55px rgba(0,0,0,.55);
      --radius: 18px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(900px 500px at 20% -10%, rgba(124,58,237,.35), transparent 60%),
        radial-gradient(800px 550px at 80% 0%, rgba(34,211,238,.28), transparent 55%),
        radial-gradient(650px 420px at 70% 100%, rgba(124,58,237,.18), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      color: var(--text);
      overflow-x:hidden;
    }

    a{color:inherit; text-decoration:none}

    .wrap{max-width:1200px; margin:0 auto; padding:28px 18px 60px}

    /* Header */
    .hero{
      position:relative;
      padding:22px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .hero:before{
      content:"";
      position:absolute; inset:-2px;
      background:
        radial-gradient(600px 220px at 20% 0%, rgba(124,58,237,.35), transparent 60%),
        radial-gradient(520px 240px at 85% 10%, rgba(34,211,238,.30), transparent 55%);
      filter: blur(0px);
      pointer-events:none;
    }
    .hero-inner{position:relative; display:flex; gap:18px; align-items:flex-start; justify-content:space-between; flex-wrap:wrap}

    .brand{
      display:flex; align-items:center; gap:12px;
    }
    .logo{
      width:44px; height:44px; border-radius:14px;
      background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(34,211,238,.9));
      box-shadow: 0 12px 40px rgba(124,58,237,.25);
      display:grid; place-items:center;
      border: 1px solid rgba(255,255,255,.18);
    }
    .logo svg{filter: drop-shadow(0 8px 20px rgba(0,0,0,.35));}

    .hero h1{margin:0; font-size:20px; letter-spacing:-.02em}
    .hero p{margin:6px 0 0; color: var(--muted); line-height:1.45; font-size:13.5px; max-width:620px}

    .actions{display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end}

    .chip{
      display:flex; align-items:center; gap:8px;
      padding:12px 14px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12.5px;
      backdrop-filter: blur(8px);

      /* Mobile tap target */
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* Ensure social buttons are always easy to tap */
    .social-chip{
      padding: 12px 14px !important;
      min-height: 44px;
      min-width: 44px;
    }

    .dot{
      width:8px; height:8px; border-radius:99px;
      background: linear-gradient(135deg, var(--brand1), var(--brand2));
      box-shadow: 0 0 0 4px rgba(124,58,237,.15);
    }

    /* Controls */
    .controls{
      margin-top:18px;
      display:grid;
      grid-template-columns: 1.2fr .9fr .7fr;
      gap:12px;
    }

    @media (max-width: 900px){
      .controls{grid-template-columns:1fr 1fr}
      .actions{justify-content:flex-start}
    }
    @media (max-width: 600px){
      .controls{grid-template-columns:1fr}
    }

    .field{
      position:relative;
      border-radius: 14px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.10);
      padding:12px 12px;
      backdrop-filter: blur(10px);
      overflow:hidden;
    }

    .field:after{
      content:"";
      position:absolute; inset:-1px;
      background: radial-gradient(300px 100px at 10% 0%, rgba(124,58,237,.22), transparent 60%);
      pointer-events:none;
      opacity:.9;
    }

    .field-inner{position:relative; z-index:1}

    label{
      display:block;
      font-size: 12px;
      color: var(--muted2);
      margin-bottom:8px;
      letter-spacing:.01em;
    }

    input[type="text"], select{
      width:100%;
      border: 1px solid rgba(255,255,255,.10);
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.18));
      color: var(--text);
      padding:10px 12px;
      border-radius: 12px;
      outline:none;
      font-size: 13.5px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
      appearance: none;
    }
    input[type="text"]:focus, select:focus{
      border-color: rgba(34,211,238,.32);
      box-shadow:
        0 0 0 3px rgba(34,211,238,.12),
        inset 0 1px 0 rgba(255,255,255,.08);
    }



    .selectWrap{
      position:relative;
      display:block;
    }
    .selectIcon{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      pointer-events:none;
      color: rgba(234,240,255,.75);
      font-weight:900;
      text-shadow: 0 0 18px rgba(34,211,238,.18);
    }

    /* Make native select list look richer when possible (some browsers ignore option colors) */
    select{
      padding-right: 34px;
    }
    option{background: #0b1020; color: #eaf0ff;}

    .btn{
      width:100%;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(34,211,238,.9));
      color: #06101c;
      font-weight: 800;
      letter-spacing: -.01em;
      cursor:pointer;
      box-shadow: 0 18px 60px rgba(124,58,237,.18);
      transition: transform .15s ease, filter .15s ease;
    }
    .btn:hover{transform: translateY(-1px); filter: brightness(1.05)}
    .btn:active{transform: translateY(0px); filter: brightness(.98)}

    /* Grid */
    .grid{
      margin-top:16px;
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap:12px;
    }

    .card{
      grid-column: span 4;
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.035));
      border: 1px solid rgba(255,255,255,.10);
      border-radius: var(--radius);
      box-shadow: 0 14px 40px rgba(0,0,0,.35);
      overflow:hidden;
      position:relative;
      min-height: 185px;
      cursor:pointer;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }
    .card:hover{
      transform: translateY(-3px);
      border-color: rgba(34,211,238,.26);
      background: linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.04));
    }
    .card:before{
      content:"";
      position:absolute; inset:-2px;
      background:
        radial-gradient(380px 160px at 15% 0%, rgba(124,58,237,.28), transparent 60%),
        radial-gradient(300px 140px at 90% 25%, rgba(34,211,238,.22), transparent 60%);
      opacity:.7;
      pointer-events:none;
    }

    .card-inner{position:relative; z-index:1; padding:14px}

    @media (max-width: 1100px){.card{grid-column: span 6}}
    @media (max-width: 700px){.card{grid-column: span 12}}

    .toprow{display:flex; gap:12px; align-items:flex-start; justify-content:space-between}
    .token{
      display:flex; gap:12px; align-items:center;
    }
    .avatar{
      width:42px; height:42px; border-radius: 16px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      display:grid; place-items:center;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    .avatar .initial{font-weight:900; letter-spacing:-.02em}

    .meta h3{margin:0; font-size: 14.5px; letter-spacing:-.01em}
    .meta .sub{margin-top:4px; color: var(--muted); font-size: 12.5px; display:flex; gap:10px; flex-wrap:wrap}

    .badge{
      padding:8px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 750;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.15);
      white-space:nowrap;
    }

    .badge.good{color: rgba(34,197,94,.95); border-color: rgba(34,197,94,.28); background: rgba(34,197,94,.08)}
    .badge.warn{color: rgba(245,158,11,.98); border-color: rgba(245,158,11,.28); background: rgba(245,158,11,.08)}
    .badge.bad{color: rgba(239,68,68,.98); border-color: rgba(239,68,68,.30); background: rgba(239,68,68,.08)}

    .desc{
      margin-top:10px;
      color: var(--muted);
      font-size: 13px;
      line-height:1.45;
      max-height: 56px;
      overflow:hidden;
      text-overflow: ellipsis;
    }

    .bottom{
      margin-top:12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .kpi{
      display:flex; gap:10px; align-items:center; color: var(--muted);
      font-size: 12.5px;
      flex-wrap:wrap;
    }

    .kpi strong{color: rgba(234,240,255,.92)}

    .cta{
      padding:10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      color: var(--text);
      font-weight: 800;
      cursor:pointer;
      transition: transform .15s ease, border-color .15s ease;
    }
    .cta:hover{transform: translateY(-1px); border-color: rgba(124,58,237,.35)}

    /* Modal */
.modal-overlay{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,0.95);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:50;
    }

    .modal{
      width:min(860px, 100%);
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.14);
      background: linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.04));
      box-shadow: 0 30px 90px rgba(0,0,0,.65);
      overflow:hidden;
    }
    .modal-header{
      padding:14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.12);
    }
    .modal-title{
      display:flex; align-items:center; gap:10px;
    }
    .close{
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.15);
      color: var(--text);
      width:42px; height:42px;
      border-radius: 14px;
      cursor:pointer;
      font-weight:900;
    }

    .modal-body{padding:16px}
    .modal-grid{display:grid; grid-template-columns: 1.1fr .9fr; gap:14px}
    @media (max-width: 800px){.modal-grid{grid-template-columns:1fr}}

    .panel{
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.14);
      border-radius: 18px;
      padding:14px;
    }

    .pillrow{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}
    .pill{
      padding:7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    ul{margin:10px 0 0; padding-left:18px; color: var(--muted); line-height:1.65}

    .modal-actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:12px}
    .primary{
      flex:1;
      min-width: 220px;
      border:0;
      border-radius: 16px;
      padding: 12px 14px;
      background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(34,211,238,.9));
      color:#06101c;
      font-weight: 900;
      cursor:pointer;
    }
    .secondary{
      flex:0 0 auto;
      border-radius: 16px;
      padding: 12px 14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.05);
      color: var(--text);
      font-weight: 850;
      cursor:pointer;
    }

    .muted{color: var(--muted)}
    .hint{font-size:12.5px; color: var(--muted2); line-height:1.5}

    .footer{
      margin-top:18px;
      color: var(--muted2);
      font-size: 12.5px;
      line-height:1.6;
      text-align:center;
    }

    /* Make sure page bottom always keeps background */
    .wrap{min-height:100vh; padding-bottom:60px}

    /* Cursor glow */
    .cursor-glow{
      position: fixed;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      pointer-events: none;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(34,211,238,.35), rgba(124,58,237,.18) 45%, transparent 70%);
      box-shadow: 0 0 0 6px rgba(124,58,237,.10), 0 0 40px rgba(34,211,238,.22);
      z-index: 999;
      opacity: .0;
      transition: opacity .2s ease;
      will-change: transform;
      mix-blend-mode: screen;
    }
    @media (prefers-reduced-motion: reduce){
      .cursor-glow{display:none}
    }

    /* Subtle motion */
    @media (prefers-reduced-motion: no-preference){

      .card:after{
        content:"";
        position:absolute;
        top:-120px; left:-120px;
        width:240px; height:240px;
        background: radial-gradient(circle, rgba(34,211,238,.18), transparent 60%);
        transform: translate(var(--x,0), var(--y,0));
        opacity:0;
        transition: opacity .2s ease;
        pointer-events:none;
      }
      .card:hover:after{opacity:1}
    }
  </style>
</head>

      const first = parts[0]?.[0] || 'A';
